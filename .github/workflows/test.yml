name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web app
        run: npm --workspace gigabite-web run lint

      - name: Run web tests
        run: npm --workspace gigabite-web run test

      - name: Build web app
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/gigabite
          JWT_SECRET: test-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm --workspace gigabite-web run build
