name: Backup PostgreSQL Database

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Create and upload database backup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BACKUP_BUCKET_NAME: ${{ secrets.R2_BACKUP_BUCKET_NAME }}

    steps:
      - name: Install PostgreSQL client and AWS CLI
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client python3-pip
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate required secrets
        run: |
          set -euo pipefail

          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL configured: yes"
          else
            echo "::error::Required secret for DATABASE_URL is not configured."
            exit 1
          fi

          required_vars=(
            R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BACKUP_BUCKET_NAME
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Required secret for ${var_name} is not configured."
              exit 1
            fi
          done

      - name: Create compressed PostgreSQL backup
        id: backup
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y-%m-%d-%H-%M-%S')"
          backup_name="gigabite-db-${timestamp}.sql.gz"
          backup_file="${RUNNER_TEMP}/${backup_name}"
          backup_key="backups/db/${backup_name}"

          pg_dump "$DATABASE_URL" --format=plain --no-owner --no-privileges | gzip -9 > "$backup_file"

          echo "backup_file=${backup_file}" >> "$GITHUB_OUTPUT"
          echo "backup_key=${backup_key}" >> "$GITHUB_OUTPUT"

      - name: Upload backup to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail

          endpoint_url="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 cp \
            "${{ steps.backup.outputs.backup_file }}" \
            "s3://${R2_BACKUP_BUCKET_NAME}/${{ steps.backup.outputs.backup_key }}" \
            --endpoint-url "$endpoint_url" \
            --only-show-errors

      - name: Report backup location
        run: |
          echo "Backup uploaded to R2 path: backups/db/$(basename "${{ steps.backup.outputs.backup_file }}")"
